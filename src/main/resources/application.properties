spring.application.name=lycan

# Explicitly tell Spring how to find the container IT just started
spring.datasource.url=jdbc:postgresql://localhost:5432/lycan_db
spring.datasource.username=jwolf
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase & JPA
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.jpa.hibernate.ddl-auto=validate

# Model for the Chat Client (The Brain)
spring.ai.ollama.chat.options.model=llama3.2

# Model for the Vector Store (They Eyes)
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Tell Spring AI to create the vector table if it's missing
spring.ai.vectorstore.pgvector.initialize-schema=true

# Keep Docker Compose enabled so it still starts the DB for you
spring.docker.compose.enabled=true